<section class="toast-region" aria-live="polite" aria-atomic="true">
  <article *ngFor="let toast of toasts$ | async" class="toast" [ngClass]="'toast-' + toast.type" role="status">
    <span class="toast-accent" aria-hidden="true"></span>
    <div class="toast-copy">
      <p class="toast-title">{{ titleFor(toast.type) }}</p>
      <p class="toast-message">{{ toast.message }}</p>
    </div>
    <button type="button" class="toast-close" (click)="dismiss(toast.id)" aria-label="Dismiss notification">
      x
    </button>
  </article>
</section>
