<section class="checkout-form">
  <h2>Checkout</h2>

  <form #f="ngForm" (ngSubmit)="placeOrder(f)" novalidate>
    <label>Name *</label>
    <input name="name" [(ngModel)]="name" required />
    <div *ngIf="f.submitted && f.controls['name']?.invalid" class="error">
      Name is required
    </div>

    <label>Email *</label>
    <input name="email" [(ngModel)]="email" type="email" required />
    <div *ngIf="f.submitted && f.controls['email']?.invalid" class="error">
      Enter a valid email
    </div>

    <label>Address *</label>
    <textarea name="address" [(ngModel)]="address" required></textarea>
    <div *ngIf="f.submitted && f.controls['address']?.invalid" class="error">
      Address is required
    </div>

    <h3>Order Summary</h3>
    <ul>
      <li *ngFor="let item of cart">{{ item.name }} - £{{ item.price }}</li>
    </ul>

    <p>
      <strong>Total: £{{ total }}</strong>
    </p>
    <button type="submit" [disabled]="isCartEmpty()">Place Order</button>
    <p *ngIf="isCartEmpty()" class="error">
      Your cart is empty. Add products before checking out.
    </p>
  </form>
</section>
