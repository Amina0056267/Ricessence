
<section class="homepage">
  <div class="hero">
    <div class="hero-content text-center">
      <h1 class="brand-title">Ricessence</h1>
      <p class="tagline">Ancient rituals. Modern hair care.</p>
      <button class="cta-btn" routerLink="/shop">Shop Now</button>
    </div>
  </div>

  <p>Hello Ricessence!</p>

  <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">
      <div
        class="carousel-item"
        *ngFor="let image of images; let i = index"
        [class.active]="i === 0"
      >
        <img [src]="image" class="d-block w-100 carousel-img" alt="Ricessence Product" />
        <div class="carousel-caption">
          <h5>Strength. Shine. Ritual.</h5>
        </div>
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>
  </div>
